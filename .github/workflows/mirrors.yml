name: Mirror to GitLab

on: [push, delete]

jobs:
  git-mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1.1.1
        with:
          target_repo_url:
            git@gitlab.com:cs4372591012/lab2.git
          ssh_private_key:
            ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}