<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Feeder</title>
</head>
<body>
    <h1>Pet Feeder</h1>

    <img src="/video_feed" alt="Live camera feed" style="max-width: 640px; display: block;">

    <h2>Sensors</h2>
    <p>Water: <span id="water-level-text">--</span> <button onclick="dispense('water')">Dispense Water</button></p>
    <p>Food: <span id="food-weight-text">--</span> <button onclick="dispense('food')">Dispense Food</button></p>

    <h2>Consumption</h2>
    <table border="1" cellpadding="6">
        <tr><th></th><th>Cat</th><th>Dog</th></tr>
        <tr><td>Food</td><td id="cat-food">0.0 g</td><td id="dog-food">0.0 g</td></tr>
        <tr><td>Water</td><td id="cat-water">0.0 mL</td><td id="dog-water">0.0 mL</td></tr>
    </table>

    <script>
        async function fetchStatus() {
            const data = await fetch("/api/status").then(r => r.json());
            document.getElementById("water-level-text").textContent = data.water_level + " mL";
            document.getElementById("food-weight-text").textContent = data.food_weight + " g";
            document.getElementById("cat-food").textContent = data.consumption.food.cat.toFixed(1) + " g";
            document.getElementById("dog-food").textContent = data.consumption.food.dog.toFixed(1) + " g";
            document.getElementById("cat-water").textContent = data.consumption.water.cat.toFixed(1) + " mL";
            document.getElementById("dog-water").textContent = data.consumption.water.dog.toFixed(1) + " mL";
        }
        async function dispense(type) {
            await fetch(`/api/dispense/${type}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ duration: 3 })
            });
            fetchStatus();
        }

        fetchStatus();
        setInterval(fetchStatus, 2000);
    </script>
</body>
</html>
